name: Micro Frontend CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1: Lint & Typecheck
  # ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  # ────────────────────────────────────────────────────────────
  # Stage 2: Unit Tests
  # ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ────────────────────────────────────────────────────────────
  # Stage 3: Component Tests
  # ────────────────────────────────────────────────────────────
  component-tests:
    name: Component Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Component Tests
        run: npm run test:component

  # ────────────────────────────────────────────────────────────
  # Stage 3b: Contract Tests (parallel with Component Tests)
  # ────────────────────────────────────────────────────────────
  contract-tests:
    name: Contract Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Contract Tests
        run: npm run test:contract

      - name: Upload Pact Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

  # ────────────────────────────────────────────────────────────
  # Stage 4: Build Verification
  # ────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: [component-tests, contract-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ────────────────────────────────────────────────────────────
  # Stage 5: E2E Tests (all) against a locally deployed stack
  # (product-service + order-service + micro-frontend) running
  # on the GitHub Actions runner.
  # ────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (all)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout micro-frontend
        uses: actions/checkout@v4
        with:
          path: micro-frontend

      - name: Checkout product-service
        uses: actions/checkout@v4
        with:
          repository: boschtech/product-service
          path: product-service
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Checkout order-service
        uses: actions/checkout@v4
        with:
          repository: boschtech/order-service
          path: order-service
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Checkout ui-playwright-automation
        uses: actions/checkout@v4
        with:
          repository: boschtech/ui-playwright-automation
          path: ui-playwright-automation
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: |
            product-service/pom.xml
            order-service/pom.xml

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            micro-frontend/package-lock.json
            ui-playwright-automation/package-lock.json

      - name: Build product-service JAR
        working-directory: product-service
        run: mvn package -DskipTests -B

      - name: Build order-service JAR
        working-directory: order-service
        run: mvn package -DskipTests -B

      - name: Install micro-frontend deps
        working-directory: micro-frontend
        run: npm ci

      - name: Build micro-frontend
        working-directory: micro-frontend
        env:
          VITE_PRODUCT_SERVICE_URL: http://localhost:8080
          VITE_ORDER_SERVICE_URL: http://localhost:8081
        run: npm run build

      - name: Start product-service
        working-directory: product-service
        env:
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          ORDER_SERVICE_URL: http://localhost:8081
        run: |
          nohup java -jar target/*.jar > product-service.log 2>&1 &
          echo $! > /tmp/product-service.pid

      - name: Start order-service
        working-directory: order-service
        env:
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          PRODUCT_SERVICE_URL: http://localhost:8080
        run: |
          nohup java -jar target/*.jar > order-service.log 2>&1 &
          echo $! > /tmp/order-service.pid

      - name: Serve micro-frontend
        working-directory: micro-frontend
        run: |
          nohup npx --yes serve -s dist -l 3000 > micro-frontend.log 2>&1 &
          echo $! > /tmp/micro-frontend.pid

      - name: Wait for services to be healthy
        run: |
          wait_for() {
            local url=$1
            echo "Waiting for $url"
            for i in $(seq 1 60); do
              if curl -sf "$url" > /dev/null 2>&1; then
                echo "✅ $url is up"
                return 0
              fi
              sleep 2
            done
            echo "❌ Timed out waiting for $url"
            return 1
          }
          wait_for http://localhost:8080/actuator/health
          wait_for http://localhost:8081/actuator/health
          wait_for http://localhost:3000

      - name: Install Playwright deps
        working-directory: ui-playwright-automation
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ui-playwright-automation
        run: npx playwright install --with-deps

      - name: Run All E2E Tests
        working-directory: ui-playwright-automation
        env:
          E2E_BASE_URL: http://localhost:3000
          CI: true
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui-playwright-automation/playwright-report/
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: ui-playwright-automation/test-results/
          retention-days: 14

      - name: Upload Service Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            product-service/product-service.log
            order-service/order-service.log
            micro-frontend/micro-frontend.log
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          for pidfile in /tmp/product-service.pid /tmp/order-service.pid /tmp/micro-frontend.pid; do
            [ -f "$pidfile" ] && kill "$(cat "$pidfile")" 2>/dev/null || true
          done

