name: Micro Frontend CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1: Lint & Typecheck
  # ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  # ────────────────────────────────────────────────────────────
  # Stage 2: Unit Tests
  # ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ────────────────────────────────────────────────────────────
  # Stage 3: Component Tests
  # ────────────────────────────────────────────────────────────
  component-tests:
    name: Component Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Component Tests
        run: npm run test:component

  # ────────────────────────────────────────────────────────────
  # Stage 3b: Contract Tests (parallel with Component Tests)
  # ────────────────────────────────────────────────────────────
  contract-tests:
    name: Contract Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Contract Tests
        run: npm run test:contract

      - name: Upload Pact Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

  # ────────────────────────────────────────────────────────────
  # Stage 4: Build Verification
  # ────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: [component-tests, contract-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
